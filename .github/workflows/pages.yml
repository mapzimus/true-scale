name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The site is published from the gh-pages branch (Pages "deploy from a branch" mode),
# so the job only needs permission to push that branch.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        # Static site with no build step: gh-pages is always an exact copy of main.
        run: git push --force origin HEAD:gh-pages
