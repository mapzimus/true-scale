name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages and mint an OIDC token for deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        # enablement:true turns Pages on via the API on first run when token perms allow,
        # so no manual Settings toggle is needed in the common case.
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
